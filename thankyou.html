<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
.bg-vibrant-mesh {
  background: linear-gradient(135deg, #0d631b 0%, #1b6d24 40%, #00897b 100%);
}
</style>

</head>

<body class="bg-surface font-body text-on-surface min-h-screen">

<!-- Background -->
<div class="fixed inset-0 bg-vibrant-mesh opacity-90 -z-10"></div>

<main class="relative px-6 pt-12 pb-12 flex flex-col items-center">

<div class="w-full max-w-md space-y-8">

<!-- Glass Card -->
<div class="relative bg-white/10 backdrop-blur-3xl rounded-[2.5rem] p-1 shadow-xl border border-white/20">

<div class="bg-surface-container-lowest/80 backdrop-blur-md rounded-[2.25rem] p-8 flex flex-col items-center text-center">

<!-- Badge -->
<div class="mb-8">
<div class="w-24 h-24 bg-tertiary-container rounded-full flex items-center justify-center shadow-lg">
<span style="font-size:32px;">🎉</span>
</div>
</div>

<!-- TEXT -->
<h2 class="font-headline text-3xl font-bold text-primary mb-4">
Thank You for Taking Climate Action
</h2>

<p class="text-on-surface-variant text-lg">
Your impact is being calculated.
</p>

<p class="mt-4 text-on-surface-variant">
📩 Your Climate Certificate will be sent to your email shortly.
</p>

<!-- Divider -->
<div class="w-12 h-1 bg-gray-300 rounded-full my-8"></div>

<!-- SHARE -->
<h3 class="text-lg font-semibold mb-4">
Invite others to take climate action 🌍
</h3>

<a href="https://wa.me/?text=🌱 I just calculated my Climate Impact!%0A%0ACheck yours 👉 https://earthcarbonfoundation.org"
   class="w-full block bg-gradient-to-r from-primary to-primary-container text-white py-4 rounded-2xl font-bold text-center">
Share on WhatsApp
</a>

</div>
</div>

<!-- Footer -->
<div class="text-center text-white/70 text-sm">
Earth Carbon Foundation
</div>

</div>

</main>

</body>
</html>
