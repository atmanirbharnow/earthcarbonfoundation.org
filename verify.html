<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon Asset Registry | Earth Carbon Foundation</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>

<style>
body { background: #f8fafc; font-family: 'Manrope', sans-serif; }
.registry-header { background: linear-gradient(135deg, #0d631b 0%, #064e3b 100%); }
</style>
</head>

<body class="text-slate-900">

<header class="registry-header text-white py-12 px-6 text-center">
    <h1 class="text-4xl font-black mb-4">Carbon Asset Registry</h1>
    <p class="opacity-80">Verify pre-certified carbon assets & sustainability scorecards</p>
</header>

<main class="max-w-4xl mx-auto px-6 py-12">

<!-- SEARCH -->
<div class="bg-white p-6 rounded-2xl shadow mb-10">
    <h2 class="font-bold mb-4">Verify Certificate</h2>

    <div class="flex gap-4">
        <input id="certId" type="text" placeholder="Enter Certificate ID (ECF-XXX)"
        class="flex-1 border p-3 rounded-lg">

        <button onclick="searchCert()"
        class="bg-green-700 text-white px-6 py-3 rounded-lg font-bold">
        Verify
        </button>
    </div>

    <div id="result" class="mt-6"></div>
</div>

<!-- LEADERBOARD -->
<div class="bg-white p-6 rounded-2xl shadow">
    <h2 class="font-bold mb-6">Top Carbon Impact Entities</h2>
    <div id="leaderboard">Loading...</div>
</div>

</main>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1ikW2LMpLj_LUANyemKmXKFD2tX0gWA9KE8QDg1ntQ6M/gviz/tq?tqx=out:csv";

// AUTO READ FROM URL (QR SUPPORT)
const params = new URLSearchParams(window.location.search);
const autoID = params.get("id");

if (autoID) {
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("certId").value = autoID;
    searchCert();
  });
}

// CSV PARSER
function parseCSV(text) {
  return text.split("\n").map(line =>
    line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
        .map(cell => cell.replace(/"/g, '').trim())
  );
}

// VERIFY FUNCTION
function searchCert() {
  const id = document.getElementById("certId").value.trim();
  const resultDiv = document.getElementById("result");

  if (!id) return;

  resultDiv.innerHTML = "Checking registry...";

  fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = parseCSV(data);
    let found = false;

    rows.slice(1).forEach(row => {

      const cert = row[10]; // Certificate ID column
      const name = row[0];
      const atma = row[7];
      const co2 = row[8];
      const revenue = row[9];

      if (cert === id) {
        found = true;

        resultDiv.innerHTML = `
        <div class="p-6 bg-green-50 border border-green-200 rounded-xl">

          <h3 class="text-xl font-bold mb-2">Verified Carbon Asset</h3>

          <p><b>Name:</b> ${name}</p>
          <p><b>Atmanirbhar %:</b> ${atma}%</p>
          <p><b>Carbon Impact:</b> ${co2} tCO₂e/year</p>
          <p><b>Revenue Potential:</b> ₹${revenue}/year</p>

          <p class="mt-4 text-sm text-green-700">
          ✔ This is a pre-verified carbon asset baseline eligible for carbon credit structuring.
          </p>

        </div>`;
      }

    });

    if (!found) {
      resultDiv.innerHTML = `<div class="text-red-600 font-bold">❌ Certificate not found</div>`;
    }

  });

}

// LEADERBOARD
fetch(sheetURL)
.then(res => res.text())
.then(data => {

  const rows = parseCSV(data);
  let users = [];

  rows.slice(1).forEach(row => {
    const name = row[0];
    const total = Number(row[8] || 0);

    if (name && !isNaN(total)) {
      users.push({ name, total });
    }
  });

  users.sort((a,b)=>b.total-a.total);

  let html = "<table class='w-full'>";
  html += "<tr><th>Name</th><th>tCO₂e</th></tr>";

  users.slice(0,10).forEach(u=>{
    html += `<tr>
      <td>${u.name}</td>
      <td>${u.total}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("leaderboard").innerHTML = html;

});

</script>

</body>
</html>
