<!DOCTYPE html>
<html>
<head>
  <title>Climate Certificate Registry</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f4f8f4;
    }

    h1 { color: green; }

    input {
      padding: 10px;
      width: 220px;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }

    .card {
      margin-top: 20px;
      padding: 15px;
      background: white;
      display: inline-block;
    }

    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ccc;
    }

  </style>
</head>

<body>

<h1>🌍 Climate Registry</h1>

<!-- STATS -->
<div>
  Total CO₂: <b id="totalCO2">--</b> |
  Users: <b id="users">--</b>
</div>

<br>

<!-- INPUT -->
<input id="certId" placeholder="Enter Certificate ID">
<button onclick="searchCert()">Verify</button>

<div id="result"></div>

<h2>🏆 Top Contributors</h2>
<div id="leaderboard"></div>

<script>

// LINKS
const sheetURL = "https://docs.google.com/spreadsheets/d/1ikW2LMpLj_LUANyemKmXKFD2tX0gWA9KE8QDg1ntQ6M/gviz/tq?tqx=out:csv";
const summaryURL = "https://docs.google.com/spreadsheets/d/1ikW2LMpLj_LUANyemKmXKFD2tX0gWA9KE8QDg1ntQ6M/gviz/tq?tqx=out:csv&gid=871606372";

// LOAD SUMMARY
fetch(summaryURL)
.then(res => res.text())
.then(data => {
  const rows = data.split("\n").map(r => r.split(","));
  rows.forEach(row => {
    if (row[0].includes("Total tCO2e"))
      document.getElementById("totalCO2").innerText = Number(row[1]).toFixed(0);

    if (row[0].includes("Total Users"))
      document.getElementById("users").innerText = row[1];
  });
});

// VERIFY
function searchCert() {

  const id = document.getElementById("certId").value;

  fetch(sheetURL)
  .then(res => res.text())
  .then(data => {

    const rows = data.split("\n").map(r => r.split(","));
    let found = false;

    rows.forEach(row => {
      if (row.includes(id)) {

        found = true;

        const name = row[2];
        const total = row[row.length - 1];

        document.getElementById("result").innerHTML =
          `<div class="card">
            <b>${name}</b><br>
            ${total} tCO₂e
          </div>`;
      }
    });

    if (!found) {
      document.getElementById("result").innerHTML = "Not found";
    }

  });
}

// LEADERBOARD
fetch(sheetURL)
.then(res => res.text())
.then(data => {

  const rows = data.split("\n").map(r => r.split(","));
  let users = [];

  rows.slice(1).forEach(row => {
    const name = row[2];
    const total = Number(row[row.length - 1]);

    if (name && total > 0) {
      users.push({ name, total });
    }
  });

  users.sort((a, b) => b.total - a.total);

  let html = "<table><tr><th>Rank</th><th>Name</th><th>tCO₂e</th></tr>";

  users.slice(0, 10).forEach((u, i) => {
    html += `<tr><td>${i+1}</td><td>${u.name}</td><td>${u.total}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("leaderboard").innerHTML = html;

});

</script>

</body>
</html>
