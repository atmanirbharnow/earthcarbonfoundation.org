<!DOCTYPE html>
<html>
<head>
  <title>Climate Certificate Registry</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: #f4f8f4;
    }

    h1 { color: green; }

    input {
      padding: 10px;
      width: 220px;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      padding: 15px;
      background: white;
      display: inline-block;
    }

    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ccc;
    }

  </style>
</head>

<body>

<h1>🌍 Climate Registry</h1>

<!-- STATS -->
<div>
  Total CO₂: <b id="totalCO2">--</b> |
  Users: <b id="users">--</b>
</div>

<br>

<!-- INPUT -->
<input id="certId" placeholder="Enter Certificate ID">
<button onclick="searchCert()">Verify</button>

<div id="result"></div>

<h2>🏆 Top Contributors</h2>
<div id="leaderboard"></div>

<script>

// =====================
// LINKS
// =====================
const sheetURL = "https://docs.google.com/spreadsheets/d/1ikW2LMpLj_LUANyemKmXKFD2tX0gWA9KE8QDg1ntQ6M/gviz/tq?tqx=out:csv";
const summaryURL = "https://docs.google.com/spreadsheets/d/1ikW2LMpLj_LUANyemKmXKFD2tX0gWA9KE8QDg1ntQ6M/gviz/tq?tqx=out:csv&gid=871606372";

// =====================
// SAFE CSV PARSER
// =====================
function parseCSV(text) {
  return text.split("\n").map(line =>
    line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
        .map(cell => cell.replace(/"/g, '').trim())
  );
}

// =====================
// LOAD SUMMARY (FIXED)
// =====================
fetch(summaryURL)
.then(res => res.text())
.then(data => {

  const rows = parseCSV(data);

  rows.forEach(row => {

    const metric = row[0];
    const value = row[1];

    if (!metric || !value) return;

if (metric === "Total tCO2e") {
  const cleanValue = Number(value.replace(/,/g, ''));
  document.getElementById("totalCO2").innerText = cleanValue.toFixed(0);
}
if (metric === "Total Users") {
  const cleanUsers = value.replace(/,/g, '');
  document.getElementById("users").innerText = cleanUsers;
}

})
.catch(err => console.log("Summary error:", err));

// =====================
// VERIFY FUNCTION
// =====================
function searchCert() {

  const id = document.getElementById("certId").value;

  if (!id) return;

  fetch(sheetURL)
  .then(res => res.text())
  .then(data => {

    const rows = parseCSV(data);
    let found = false;

    rows.forEach(row => {

      if (row.includes(id)) {

        found = true;

        const name = row[2];
        const total = row[row.length - 1];

        document.getElementById("result").innerHTML =
          `<div class="card">
            <b>${name}</b><br>
            ${Number(total).toFixed(2)} tCO₂e
          </div>`;
      }

    });

    if (!found) {
      document.getElementById("result").innerHTML = "❌ Certificate not found";
    }

  });

}

// =====================
// LEADERBOARD (FIXED)
// =====================
fetch(sheetURL)
.then(res => res.text())
.then(data => {

  const rows = parseCSV(data);
  let users = [];

  rows.slice(1).forEach(row => {

    const name = row[2];
    const total = Number(row[row.length - 1]);

    if (name && !isNaN(total)) {
      users.push({ name, total });
    }

  });

  users.sort((a, b) => b.total - a.total);

  let html = "<table><tr><th>Rank</th><th>Name</th><th>tCO₂e</th></tr>";

  users.slice(0, 10).forEach((u, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td>${u.name}</td>
      <td>${u.total.toFixed(2)}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("leaderboard").innerHTML = html;

})
.catch(err => console.log("Leaderboard error:", err));

</script>

</body>
</html>
