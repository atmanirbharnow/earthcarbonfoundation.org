<!DOCTYPE html>
<html>
<head>
  <title>Verify Certificate</title>
</head>
<body>

<h2>Climate Certificate Verification</h2>

<input type="text" id="certId" placeholder="Enter Certificate ID">
<button onclick="searchCert()">Verify</button>

<p id="result"></p>

<script>
function searchCert() {
  var id = document.getElementById("certId").value;

  document.getElementById("result").innerHTML =
  "Searching for Certificate ID: " + id + "<br><br>" +
  "👉 View full data here:<br>" +
  "<a href='https://docs.google.com/spreadsheets/d/1ikW2LMpLj_LUANyemKmXKFD2tX0gWA9KE8QDg1ntQ6M' target='_blank'>Open Registry</a>";
}
</script>

</body>
</html>
