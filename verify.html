<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Certificate | Earth Carbon</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="cert-page">
  <header class="cert-header">
    <h1>🔍 Certificate Verification</h1>
    <a href="index.html">← Back to Home</a>
  </header>

  <main class="cert-wrapper">
    <div class="verify-box">
      <h2>Verify an Earth Carbon Certificate</h2>
      <input type="text" id="verify-input" placeholder="Enter Certificate ID (e.g., ECF-2026-XXXXXX)">
      <div class="verify-btns">
        <button id="verify-btn"> Verify</button>
        <button id="scan-btn">📷 Scan QR</button>
      </div>
      <div id="qr-reader" style="width:100%;margin-top:10px;display:none;"></div>
      <div id="verify-result" class="verify-result" style="display:none;"></div>
    </div>
  </main>

  <script>
    const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"; // PASTE SAME URL
    document.getElementById("verify-btn").addEventListener("click", () => {
      const id = document.getElementById("verify-input").value.trim();
      if(!id) return alert("Enter a Certificate ID");
      verifyCert(id);
    });

    document.getElementById("scan-btn").addEventListener("click", () => {
      const reader = document.getElementById("qr-reader");
      reader.style.display = "block";
      const html5QrCode = new Html5Qrcode("qr-reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 })
        .then(decoded => {
          html5QrCode.stop();
          reader.style.display = "none";
          const url = new URL(decoded);
          verifyCert(url.searchParams.get("certId"));
        }).catch(err => console.warn(err));
    });

    function verifyCert(id) {
      const res = document.getElementById("verify-result");
      res.style.display = "block";
      res.innerHTML = " Checking registry...";
      fetch(`${API_URL}?certId=${id}`)
        .then(r => r.json())
        .then(data => {
          if(data.status === "success") {
            res.innerHTML = `
              <div class="verify-success">
                <h3>✅ Certificate Verified</h3>
                <p><strong>ID:</strong> ${data.data.certId}</p>
                <p><strong>Holder:</strong> ${data.data.name}</p>
                <p><strong>tCO₂e:</strong> ${data.data.tCO2e} | <strong>Atmanirbhar:</strong> ${data.data.atmanirbhar}%</p>
                <p><strong>Hash:</strong> ${data.data.hash}</p>
                <a href="thankyou.html?certId=${id}" class="btn-small">View Full Certificate</a>
              </div>`;
          } else {
            res.innerHTML = `<div class="verify-fail">❌ ${data.message}</div>`;
          }
        }).catch(() => res.innerHTML = `<div class="verify-fail"> Network error. Try again.</div>`);
    }
  </script>
</body>
</html>
