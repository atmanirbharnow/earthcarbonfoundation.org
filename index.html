<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Earth Carbon Foundation</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  min-height: 100vh;
}
.bg-vibrant-mesh {
  background: linear-gradient(135deg, #0d631b 0%, #1b6d24 40%, #00897b 100%);
}
</style>

</head>

<body class="bg-surface font-body text-on-surface">

<!-- Background -->
<div class="fixed inset-0 bg-vibrant-mesh opacity-95 -z-10"></div>

<main class="px-6 pt-16 pb-12 flex flex-col items-center text-center">

<div class="max-w-md w-full">

<!-- Badge -->
<div class="mb-10">
<div class="w-24 h-24 mx-auto bg-yellow-400 rounded-full flex items-center justify-center shadow-lg">
<span style="font-size:32px;">🌍</span>
</div>
</div>

<!-- Heading -->
<h1 class="text-3xl font-bold text-white mb-4">
Measure Your Climate Impact
</h1>

<p class="text-white/80 mb-8">
Enter your actions and get your Climate Certificate instantly via email.
</p>

<!-- CTA -->
<a href="https://forms.gle/ADpXHsNWwCFMHYoZ9"
   class="block bg-white text-green-900 font-bold py-4 rounded-2xl shadow-lg text-lg">
   Get My Climate Certificate 🌱
</a>

<p class="text-white/70 mt-4 text-sm">
Free • Takes 2 minutes • Delivered via email
</p>

<!-- Divider -->
<div class="my-10 h-1 w-12 bg-white/30 mx-auto rounded"></div>

<!-- Features -->
<div class="space-y-6 text-left text-white">

<div class="bg-white/10 p-4 rounded-xl">
🌳 Trees Equivalent Impact
</div>

<div class="bg-white/10 p-4 rounded-xl">
🚗 Travel Emissions Reduced
</div>

<div class="bg-white/10 p-4 rounded-xl">
⚡ Energy Savings Calculated
</div>

</div>

</div>

</main>

</body>
</html>
